name: Daily Market Monitor

on:
  schedule:
    # 每天台灣時間早上 9:00 執行 (UTC 01:00)
    - cron: '0 1 * * *'
  # 也允許手動觸發
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests beautifulsoup4 pandas numpy
      
      - name: Run monitor script
        run: python daily_monitor_v4.py
      
      - name: Commit and push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dashboard_v4.html daily_data_v4.json
          git diff --staged --quiet || git commit -m "📊 Daily update $(date +'%Y-%m-%d')"
          git push
